---
- name: Create temporary file for compose containers configuration
  ansible.builtin.tempfile:
    suffix: .compose
    state: directory
  register: ansible_test_tmp_dir
  notify: 'Clean resources'

# Create container network
- name: Create container network
  ansible.builtin.command: >-
    {{ container_runtime }} network create {{ ansible_test_container_network }}

# Vault server
- name: Deploy vault dev server
  ansible.builtin.command:
    argv:
      - "{{ container_runtime }}"
      - run
      - --name
      - "{{ ansible_test_vault_container_name }}"
      - -d
      - --network
      - "{{ ansible_test_container_network }}"
      - --cap-add
      - IPC_LOCK
      - -e
      - "SKIP_SETCAP=true"
      - -e
      - "VAULT_LOCAL_CONFIG={\"disable_mlock\": true}"
      - -e
      - "VAULT_DEV_ROOT_TOKEN_ID={{ ansible_test_vault_root_token }}"
      - -e
      - "VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200"
      - -p
      - "8200:8200"
      - docker.io/hashicorp/vault:latest
  no_log: true

- name: Wait for container to join network
  ansible.builtin.pause:
    seconds: 5

- name: Validate Vault container readiness
  block:
    - name: Ensure Vault container is running
      ansible.builtin.command:
        argv:
          - "{{ container_runtime }}"
          - container
          - ls
          - --filter
          - "name=^/{{ ansible_test_vault_container_name }}$"
          - --filter
          - status=running
          - --quiet
      register: vault_container_running
      changed_when: false
      failed_when: vault_container_running.stdout == ""

    - name: Wait for Vault to be ready at configured URL
      ansible.builtin.uri:
        url: "{{ ansible_test_vault_url }}/v1/sys/health"
        status_code: [200, 429, 472, 473, 501, 503]
        use_proxy: false
      register: vault_health
      until: vault_health is succeeded
      retries: 20
      delay: 2
  rescue:
    - name: Retry Vault readiness with container hostname URL
      block:
        - name: Set fallback URL to Vault container hostname
          ansible.builtin.set_fact:
            ansible_test_vault_url: "http://{{ ansible_test_vault_container_name }}:8200"

        - name: Wait for Vault to be ready at fallback URL
          ansible.builtin.uri:
            url: "{{ ansible_test_vault_url }}/v1/sys/health"
            status_code: [200, 429, 472, 473, 501, 503]
            use_proxy: false
          register: vault_health_fallback
          until: vault_health_fallback is succeeded
          retries: 20
          delay: 2
      rescue:
        - name: Collect Vault container logs
          ansible.builtin.command:
            argv:
              - "{{ container_runtime }}"
              - logs
              - "{{ ansible_test_vault_container_name }}"
          register: vault_logs
          changed_when: false
          failed_when: false

        - name: Fail with Vault startup details
          ansible.builtin.fail:
            msg: >-
              Vault container failed startup/readiness checks.
              Logs have been collected but not displayed to avoid leaking secrets.
              Run 'docker logs {{ ansible_test_vault_container_name }}' locally to debug.

- name: Vault enable databse engine
  vault_http_request:
    url: "{{ ansible_test_vault_url }}/v1/sys/mounts/database"
    method: POST
    token: "{{ ansible_test_vault_root_token }}"
    payload:
      type: "database"
      description: "Database secrets engine"
  register: result
  retries: 10
  delay: 3
  until: result is successful
  no_log: true


# PostGreSQL
- name: Generate init-user.sql file
  ansible.builtin.template:
    src: init-user.sql.j2
    dest: "{{ ansible_test_tmp_dir.path }}/init-user.sql"
    mode: '0644'

- name: Deploy the PostGreSQL container
  ansible.builtin.command:
    argv:
      - "{{ container_runtime }}"
      - run
      - --name
      - "{{ ansible_test_postgres_container_name }}"
      - -d
      - --network
      - "{{ ansible_test_container_network }}"
      - -p
      - "5432:5432"
      - -e
      - "POSTGRES_USER={{ ansible_test_db_admin_user }}"
      - -e
      - "POSTGRES_PASSWORD={{ ansible_test_db_admin_user_password }}"
      - -v
      - "{{ ansible_test_tmp_dir.path }}/init-user.sql:/docker-entrypoint-initdb.d/init-user.sql:Z"
      - docker.io/postgres:17-alpine
  no_log: true

- name: Wait for PostgreSQL container to initialize
  ansible.builtin.pause:
    seconds: 5

- name: Validate connection to PostGreSQL
  postgres_connect:
    db_user: "{{ item.user }}"
    db_user_password: "{{ item.password }}"
  loop:
    - user: "{{ ansible_test_db_admin_user }}"
      password: "{{ ansible_test_db_admin_user_password }}"
    - user: "{{ ansible_test_db_user }}"
      password: "{{ ansible_test_db_user_password }}"
  retries: 10
  delay: 2
  register: postgres_validation
  until: postgres_validation is succeeded
