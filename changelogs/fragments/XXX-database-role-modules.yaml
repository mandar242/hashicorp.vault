---
minor_changes:
  - database_role - New module to manage HashiCorp Vault database dynamic roles
    with support for creating, updating, and deleting role configurations including
    creation statements, revocation statements, and TTL settings
    (https://github.com/ansible-collections/hashicorp.vault/pull/XXX).
  - database_role_info - New module to read HashiCorp Vault database dynamic role
    configurations. Returns role details including database connection name, SQL
    statements, and TTL values
    (https://github.com/ansible-collections/hashicorp.vault/pull/XXX).
  - meta/runtime.yml - Add ``database_role`` and ``database_role_info`` modules to
    the ``vault`` action group to enable module_defaults inheritance
    (https://github.com/ansible-collections/hashicorp.vault/pull/XXX).
